# Base compose: just the dev environment for working on kap itself.
# The kap proxy sidecar is in docker-compose.kap.yml (overlay).
services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: dev
    volumes:
      - ..:/workspaces/kap:cached
      - history:/commandhistory
      - cargo-cache:/home/vscode/.cargo/registry
      - cargo-git:/home/vscode/.cargo/git
      - target-cache:/workspaces/kap/target
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${DEVCONTAINER_CLAUDE_CODE_OAUTH_TOKEN:-}
    command: sleep infinity

volumes:
  history:
  cargo-cache:
  cargo-git:
  target-cache:
