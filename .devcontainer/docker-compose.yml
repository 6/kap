services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: dev
    volumes:
      - ..:/workspaces/devcontainer-guard:cached
      - history:/commandhistory
      - cargo-cache:/home/vscode/.cargo/registry
      - cargo-git:/home/vscode/.cargo/git
      - target-cache:/workspaces/devcontainer-guard/target
      # 1Password SSH agent (macOS). Falls back to Docker Desktop SSH agent.
      - ${HOME}/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock:/ssh-agent:ro
    environment:
      SSH_AUTH_SOCK: /ssh-agent
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128
      http_proxy: http://proxy:3128
      https_proxy: http://proxy:3128
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    dns:
      - 172.28.0.3
    command: sleep infinity
    networks:
      sandbox:
        ipv4_address: 172.28.0.2
    depends_on:
      proxy:
        condition: service_healthy

  proxy:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: proxy
    volumes:
      - ./devg.toml:/etc/devg/config.toml:ro
      - proxy-logs:/var/log/devg
    env_file:
      - path: .env
        required: false
    networks:
      sandbox:
        ipv4_address: 172.28.0.3
      external:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "devg", "check", "--proxy"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  history:
  proxy-logs:
  cargo-cache:
  cargo-git:
  target-cache:

networks:
  sandbox:
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  external:
    driver: bridge
