services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/devcontainer-egress-proxy:cached
      - history:/commandhistory
      - cargo-cache:/home/vscode/.cargo/registry
      - cargo-git:/home/vscode/.cargo/git
      - target-cache:/workspaces/devcontainer-egress-proxy/target
      - ${HOME}/.devp-sockets:/devp-sockets:ro
    environment:
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128
      http_proxy: http://proxy:3128
      https_proxy: http://proxy:3128
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
      GIT_CONFIG_GLOBAL: /home/vscode/.gitconfig-devp
    command: sleep infinity
    networks:
      sandbox:
    depends_on:
      proxy:
        condition: service_healthy

  proxy:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.proxy
    volumes:
      - ./devp.toml:/etc/devp/config.toml:ro
      - proxy-logs:/var/log/devp
    networks:
      sandbox:
      external:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "devp", "check", "--proxy"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  history:
  proxy-logs:
  cargo-cache:
  cargo-git:
  target-cache:

networks:
  sandbox:
    internal: true
  external:
    driver: bridge
