# devg.toml — devcontainer-guard configuration for dogfooding

[proxy.network]
allow = [
  # GitHub
  "github.com",
  "*.github.com",
  "*.githubusercontent.com",
  # Rust
  "crates.io",
  "*.crates.io",
  "rustup.rs",
  "*.rust-lang.org",
  # Node / npm
  "*.npmjs.org",
  "*.npmjs.com",
  "registry.npmjs.org",
  "nodejs.org",
  "*.yarnpkg.com",
  "storage.googleapis.com",
  # APT
  "*.ubuntu.com",
  "*.debian.org",
  # AI
  "anthropic.com",
  "*.anthropic.com",
  "claude.ai",
  "*.claude.ai",
  "claude.com",
  "*.claude.com",
  "openai.com",
  "*.openai.com",
  "generativelanguage.googleapis.com",
]
# deny overrides allow:
# deny = ["gist.github.com"]

[proxy.observe]
log = "/var/log/devg/proxy.jsonl"

# Compose overlay: build devg from source (this is the devg project itself)
[compose]
build = { context = "..", dockerfile = ".devcontainer/Dockerfile", target = "proxy" }

# MCP proxy: tool-level filtering + credential isolation
[mcp]

# Servers registered via `devg mcp add` are auto-discovered from ~/.devg/auth/
# Add a [[mcp.servers]] entry only to restrict tools:

# Auth comes from ~/.devg/auth/ (via `devg mcp add`)
# Just list the name + allowed tools here.

[[mcp.servers]]
name = "context7"
allow_tools = ["*"]

[[mcp.servers]]
name = "linear"
allow_tools = ["get_*", "list_*", "search_*", "save_*"]

# CLI proxy: credentials stay on sidecar, commands are allowlisted
[cli]

[[cli.tools]]
name = "gh"
allow = ["pr *", "issue *", "repo *", "search *", "auth status"]
deny = ["auth *", "api"]
env = ["GH_TOKEN"]
