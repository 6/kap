# devg.toml — devcontainer-guard configuration for dogfooding

[proxy.network]
allow = [
  # GitHub
  "github.com",
  "*.github.com",
  "*.githubusercontent.com",
  # Rust
  "crates.io",
  "*.crates.io",
  "rustup.rs",
  "*.rust-lang.org",
  # Node / npm (for Claude Code install)
  "*.npmjs.org",
  "*.npmjs.com",
  "registry.npmjs.org",
  "storage.googleapis.com",
  # APT
  "*.ubuntu.com",
  "*.debian.org",
  # AI
  "anthropic.com",
  "*.anthropic.com",
  "claude.ai",
  "*.claude.ai",
  "claude.com",
  "*.claude.com",
  "openai.com",
  "*.openai.com",
  "generativelanguage.googleapis.com",
]
# deny overrides allow:
# deny = ["gist.github.com"]

[proxy.observe]
log = "/var/log/devg/proxy.jsonl"

# Compose overlay: build devg from source (this is the devg project itself)
[compose]
build = { context = "..", dockerfile = ".devcontainer/Dockerfile", target = "proxy" }

# MCP proxy: tool-level filtering + credential isolation
[mcp]

# Servers registered via `devg mcp add` are auto-discovered from ~/.devg/auth/
# Add a [[mcp.servers]] entry only when you need tool filtering or non-OAuth auth:

[[mcp.servers]]
name = "context7"
upstream = "https://mcp.context7.com/mcp"
headers = { "CONTEXT7_API_KEY" = "${CONTEXT7_API_KEY}" }

# linear is auto-discovered from ~/.devg/auth/linear.json; restrict destructive tools
[[mcp.servers]]
name = "linear"
deny_tools = ["delete_*"]
