# devp.toml — proxy and credential configuration for dogfooding devp itself

[proxy.network]
allow = [
  # GitHub
  "github.com",
  "*.github.com",
  "*.githubusercontent.com",
  # Rust
  "crates.io",
  "*.crates.io",
  "rustup.rs",
  "*.rust-lang.org",
  # APT
  "*.ubuntu.com",
  "*.debian.org",
  # AI
  "anthropic.com",
  "*.anthropic.com",
  "openai.com",
  "*.openai.com",
  "generativelanguage.googleapis.com",
]
# deny overrides allow:
# deny = ["gist.github.com"]

[proxy.observe]
log = "/var/log/devp/proxy.jsonl"

[credentials]
socket = "/devp-sockets/cred.sock"
host_socket = "~/.devp-sockets/cred.sock"

[credentials.github]
hosts = ["github.com"]
